name: Install Packages with Yarn
description: Install packages with Yarn based on the package.json file(s) located in the specified directories

inputs:
  paths:
    description: List of directories where file package.json located
    default: .
    required: false
  frozen:
    description: Run installs in strict lockfile mode
    default: 'false'
    required: false
  ignore-scripts:
    description: Do not run package lifecycle scripts during install
    default: 'false'
    required: false

runs:
  using: composite
  steps:
  - name: Cache tools
    # see https://github.com/actions/cache/commits/main/
    uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
    with:
      path: |
        **/node_modules
      key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

  - name: Install Packages
    run: |
      paths_str=$'${{ inputs.paths }}'
      paths=(${paths_str//$'\n'/ })
      frozen='${{ inputs.frozen }}'
      ignore_scripts='${{ inputs.ignore-scripts }}'
      dir="$(pwd)"

      for path in "${paths[@]}"
      do
        target="${dir}/${path}"
        echo "${target}"
        if [ ! -d "${target}" ]; then
            continue
        fi

        cd "${target}"
        if [ "${ignore_scripts}" = 'true' ]; then
          yarn_version="$(yarn --version)"
          yarn_major="${yarn_version%%.*}"

          if [ "${frozen}" = 'true' ] && [ "${yarn_major}" -ge 2 ] 2>/dev/null; then
            YARN_ENABLE_SCRIPTS=false yarn install --frozen-lockfile
          elif [ "${frozen}" = 'true' ]; then
            yarn install --frozen-lockfile --ignore-scripts
          elif [ "${yarn_major}" -ge 2 ] 2>/dev/null; then
            YARN_ENABLE_SCRIPTS=false yarn install
          else
            yarn install --ignore-scripts
          fi
        elif [ "${frozen}" = 'true' ]; then
          yarn install --frozen-lockfile
        else
          yarn install
        fi
      done
    shell: bash
