name: Run and Handle Pre-Commit
description: Compatibility wrapper for pre-commit. Prefer ./pre-commit.

inputs:
  config:
    description: Path to pre-commit configuration file
    required: false
    default: .pre-commit-config.yaml
  asdf-version:
    description: asdf version to install when python3 is missing
    required: false
    default: v0.19.0
  python-version:
    description: Python version to install with asdf when python3 is missing
    required: false
    default: 3.14.6
  pre-commit-version:
    description: Pre-commit version to install when pre-commit is missing
    required: false
    default: 4.6.0
  commit-on-pr:
    description: Commit and push changes when running on pull_request
    required: false
    default: 'true'
  commit-on-push:
    description: Commit and push changes when running on push
    required: false
    default: 'false'

runs:
  using: composite
  steps:
  - name: Cache pre-commit environment
    uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
    with:
      path: ~/.cache/pre-commit
      key: pre-commit-${{ inputs.python-version }}-${{ inputs.pre-commit-version }}-${{ hashFiles(inputs.config) }}
      restore-keys: |
        pre-commit-

  - name: Run pre-commit
    shell: bash
    run: bash "${{ github.action_path }}/../pre-commit/run.sh"
    env:
      PRECOMMIT_ACTION_PATH: ${{ github.action_path }}/..
      PRECOMMIT_CONFIG: ${{ inputs.config }}
      PRECOMMIT_ASDF_VERSION: ${{ inputs.asdf-version }}
      PRECOMMIT_PYTHON_VERSION: ${{ inputs.python-version }}
      PRECOMMIT_VERSION: ${{ inputs.pre-commit-version }}
      PRECOMMIT_COMMIT_ON_PR: ${{ inputs.commit-on-pr }}
      PRECOMMIT_COMMIT_ON_PUSH: ${{ inputs.commit-on-push }}
