name: Validate GitHub Actions

on:
  pull_request:
    paths:
    - .github/workflows/**
    - action.yml
    - '*/action.yml'
  push:
    branches:
    - main
    paths:
    - .github/workflows/**
    - action.yml
    - '*/action.yml'
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca
