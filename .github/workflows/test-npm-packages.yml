name: Test action npm-packages

on:
  pull_request:
    paths:
    - .github/workflows/test-npm-packages.yml
    - npm-packages/**
    - tests/fixtures/npm-packages/**
  push:
    branches:
    - main
    paths:
    - .github/workflows/test-npm-packages.yml
    - npm-packages/**
    - tests/fixtures/npm-packages/**
  workflow_dispatch:

jobs:
  npm-packages-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '20'

    - name: Install package fixtures
      uses: ./npm-packages
      with:
        paths: |
          tests/fixtures/npm-packages/app-one
          tests/fixtures/npm-packages/app-two

    - name: Verify npm install outputs
      shell: bash
      run: |
        test -f tests/fixtures/npm-packages/app-one/package-lock.json
        test -f tests/fixtures/npm-packages/app-two/package-lock.json

    - name: Reinstall package fixtures in frozen mode
      uses: ./npm-packages
      with:
        frozen: 'true'
        paths: |
          tests/fixtures/npm-packages/app-one
          tests/fixtures/npm-packages/app-two

    - name: Reinstall package fixtures ignoring scripts
      uses: ./npm-packages
      with:
        ignore-scripts: 'true'
        paths: |
          tests/fixtures/npm-packages/app-one
          tests/fixtures/npm-packages/app-two
