name: Test action precommit

on:
  pull_request:
    paths:
    - .github/workflows/test-precommit.yml
    - precommit/**
    - tests/fixtures/precommit/**
  push:
    branches:
    - main
    paths:
    - .github/workflows/test-precommit.yml
    - precommit/**
    - tests/fixtures/precommit/**
  workflow_dispatch:

jobs:
  precommit-pass:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.12'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run precommit action on clean fixture
      uses: ./precommit
      with:
        config: tests/fixtures/precommit/.pre-commit-config.yaml
        commit-on-pr: 'false'
        commit-on-push: 'false'

  precommit-fails-on-autofix-when-commit-disabled:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.12'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Make fixture fail formatting hooks
      shell: bash
      run: |
        printf 'fixture with trailing spaces   \n' > tests/fixtures/precommit/sample.txt

    - name: Run precommit action with auto-commit disabled
      id: precommit
      continue-on-error: true
      uses: ./precommit
      with:
        config: tests/fixtures/precommit/.pre-commit-config.yaml
        commit-on-pr: 'false'
        commit-on-push: 'false'

    - name: Verify failure and auto-fix behavior
      shell: bash
      env:
        PRECOMMIT_OUTCOME: ${{ steps.precommit.outcome }}
      run: |
        test "$PRECOMMIT_OUTCOME" = "failure"
        test "$(cat tests/fixtures/precommit/sample.txt)" = "fixture with trailing spaces"
