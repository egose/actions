name: Release

on:
  push:
    tags:
    - v*.*.*

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
