name: Test action pnpm-packages

on:
  pull_request:
    paths:
    - .github/workflows/test-pnpm-packages.yml
    - pnpm-packages/**
    - tests/fixtures/pnpm-packages/**
  push:
    branches:
    - main
    paths:
    - .github/workflows/test-pnpm-packages.yml
    - pnpm-packages/**
    - tests/fixtures/pnpm-packages/**
  workflow_dispatch:

jobs:
  pnpm-packages-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '20'

    - name: Enable Corepack
      run: corepack enable

    - name: Install package fixtures
      uses: ./pnpm-packages
      with:
        paths: |
          tests/fixtures/pnpm-packages/app-one
          tests/fixtures/pnpm-packages/app-two

    - name: Verify pnpm install outputs
      shell: bash
      run: |
        test -f tests/fixtures/pnpm-packages/app-one/pnpm-lock.yaml
        test -f tests/fixtures/pnpm-packages/app-two/pnpm-lock.yaml

    - name: Reinstall package fixtures in frozen mode
      uses: ./pnpm-packages
      with:
        frozen: 'true'
        paths: |
          tests/fixtures/pnpm-packages/app-one
          tests/fixtures/pnpm-packages/app-two

    - name: Reinstall package fixtures ignoring scripts
      uses: ./pnpm-packages
      with:
        ignore-scripts: 'true'
        paths: |
          tests/fixtures/pnpm-packages/app-one
          tests/fixtures/pnpm-packages/app-two
